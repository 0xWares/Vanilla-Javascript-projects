<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section>
      <div class="infos">
        <div class="info">
          <h1>Highest score: <span class="highest_score">0</span></h1>
        </div>
        <div class="info">
          <h1>Score: <span class="score">0</span></h1>
        </div>
        <div class="info">
          <h1>Time: <span class="time">0</span></h1>
        </div>
      </div>
      <div class="board">

      </div>
    </section>
    <div class="modal">
      <div class="start-game">
        <h3>Welcome to the snake game</h3>
        <button class="btn btn-start">Start Game</button>
      </div>
      <div class="game-over">
        <h3>GAME OVER!</h3>
        <h4>Score: <span class="score">0</span></h4>
        <h4>Highest Score: <span class="highest-score">0</span></h4>
        <h4>Time: <span class="time">0</span></h4>
        <div class="btn restart">Restart game!</div>
      </div>
    </div>
  </main>
  

  <!-- script  -->
   <script src="script.js"></script>
</body>
</html>
