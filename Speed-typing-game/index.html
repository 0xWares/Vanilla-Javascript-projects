<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed typing game</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="dark-theme">
  <div class="info container">
    <div class="time" id="timer">0</div>
    <div class="wpm">0 WPM</div>
  </div>
  
  <div class="container">
    <div class="quote-display" id="quoteDisplay"></div>
    <textarea id="quoteInput" class="quote-input" placeholder="Start typing now..." autofocus></textarea>
    <div class="btmflex">
      <div class="reload bottombtns">
        <i class="fa-solid fa-arrow-rotate-right"></i>
      </div>
      <div class="theme-toggler bottombtns">
        <i class="fa-regular fa-moon"></i>
      </div>
      
    </div>
  </div>

  <div class="history container">
      <h3>Hello world</h3>
    <div id="recordContainer">
      
    </div>
      
      
      
     

      

   

  </div>

  <p>Made with ❤️ for Mitika...</p>

  <script src="script.js"></script>
</body>
</html>
