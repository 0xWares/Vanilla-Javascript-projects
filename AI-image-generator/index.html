<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./images/img.png" type="image/x-icon">
  <title>AI Image Generator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="">
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <img src="./images/img.png" alt="Logo">
        <h1>AI Image Generator</h1>
      </div>
      <button class="theme-toggle" title="Toggle theme">
        <i class="fa-solid fa-circle-half-stroke"></i>
      </button>
    </div>

    <!-- Prompt -->
    <div class="main-content">
      <form id="generate-form" class="form">
        <div class="prompt-container">
          <textarea
            class="prompt-input"
            placeholder="Describe the image you want to generate…"
            required
            autofocus
          ></textarea>
          <button type="button" class="enhance-btn" title="Enhance prompt">
            <i class="fa-solid fa-pen"></i>
          </button>
        </div>


        <div class="actions">
      <div class="selects">
        <div class="option-wrapper">
          <i class="fa-solid fa-cube select-icon"></i>
          <select class="custom-select" id="model-select">
            <option value="" selected disabled>Select Model</option>
            <option value="black-forest-labs/FLUX.1-dev">FLUX.1-dev</option>
            <option value="black-forest-labs/FLUX.1-schnell">FLUX.1-schnell</option>
            <option value="stabilityai/stable-diffusion-xl-base-1.0">Stable Diffusion XL</option>
            <option value="runwayml/stable-diffusion-v1-5">Stable Diffusion v1.5</option>
            <option value="prompthero/openjourney">OpenJourney</option>
          </select>
        </div>

        <div class="option-wrapper">
          <i class="fa-solid fa-images select-icon"></i>
          <select class="custom-select" id="number-select">
            <option value="" selected disabled>Number of Images</option>
            <option value="1">1 Image</option>
            <option value="2">2 Images</option>
            <option value="3">3 Images</option>
            <option value="4">4 Images</option>
          </select>
        </div>

        <div class="option-wrapper">
          <i class="fa-solid fa-crop-simple select-icon"></i>
          <select class="custom-select" id="aspect-ratio-select">
            <option value="" selected disabled>Aspect Ratio</option>
            <option value="1/1">Square (1:1)</option>
            <option value="16/9">Landscape (16:9)</option>
            <option value="9/16">Portrait (9:16)</option>
          </select>
        </div>
      </div>

      <button type="submit" form="generate-form" class="generate-btn">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        Generate
      </button>
      </div>

      <!-- Result gallery -->
       <div class="gallery-grid ">
        


        


       
       </div>

      </form>
    </div>

    

  </div>

  <script src="./script.js"></script>
</body>
</html>
